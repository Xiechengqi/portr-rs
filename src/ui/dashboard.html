<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TokenSwitch</title>
    <style>
      :root {
        --background: #fafafa;
        --foreground: #0f172a;
        --muted: #f1f5f9;
        --muted-foreground: #64748b;
        --accent: #0052ff;
        --accent-secondary: #4d7cff;
        --border: #e2e8f0;
        --card: #ffffff;
        --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background: #ffffff;
        color: var(--foreground);
      }
      .page {
        max-width: 1200px;
        min-height: 100vh;
        margin: 0 auto;
        padding: 28px 20px 32px;
        display: flex;
        flex-direction: column;
      }
      main { flex: 1; }

      /* ── Topbar ── */
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 32px;
      }
      .topbar-brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font: 12px/1 "JetBrains Mono", monospace;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--accent);
        text-decoration: none;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), var(--accent-secondary));
        box-shadow: 0 0 0 6px rgba(0, 82, 255, 0.08);
        animation: pulse 2.2s infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.15); opacity: 0.7; }
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
        font-size: 13px;
        color: var(--muted-foreground);
      }
      .topbar-stat {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        cursor: help;
      }
      .topbar-stat strong {
        font-weight: 600;
        color: var(--foreground);
      }
      .topbar-region {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--card);
      }
      .topbar-region label {
        font-size: 12px;
        font-weight: 600;
        color: var(--foreground);
      }
      .topbar-region select {
        border: 0;
        background: transparent;
        color: var(--foreground);
        font: inherit;
        outline: none;
        cursor: pointer;
      }
      .topbar-sep {
        margin: 0 4px;
        opacity: 0.4;
      }
      .topbar-sync {
        margin-left: 8px;
        padding-left: 14px;
        border-left: 1px solid var(--border);
        font-size: 12px;
        color: var(--muted-foreground);
      }
      .map-shell {
        position: relative;
        min-height: 360px;
        border-radius: 10px;
        background:
          linear-gradient(180deg, rgba(0, 82, 255, 0.025), rgba(0, 82, 255, 0.015)),
          #f8fbff;
        border: 1px solid rgba(226, 232, 240, 0.9);
        overflow: hidden;
        cursor: grab;
        user-select: none;
      }
      .map-shell.dragging { cursor: grabbing; }
      .map-shell.dragging .map-canvas { transition: none; }
      .map-controls {
        position: absolute;
        left: 16px;
        bottom: 16px;
        z-index: 4;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border: 1px solid rgba(226, 232, 240, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
      }
      .map-zoom-label {
        min-width: 48px;
        text-align: center;
        font: 11px/1 "JetBrains Mono", monospace;
        color: var(--muted-foreground);
      }
      .map-control-btn {
        appearance: none;
        border: 1px solid rgba(226, 232, 240, 0.95);
        background: rgba(255, 255, 255, 0.9);
        color: var(--foreground);
        border-radius: 10px;
        width: 30px;
        height: 30px;
        font: 16px/1 "JetBrains Mono", monospace;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
      }
      .map-control-btn:hover {
        background: #ffffff;
        border-color: rgba(0, 82, 255, 0.22);
      }
      .map-shell::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }
      .map-shell::before {
        background:
          linear-gradient(transparent 24.5%, rgba(15, 23, 42, 0.03) 25%, transparent 25.5%, transparent 49.5%, rgba(15, 23, 42, 0.03) 50%, transparent 50.5%, transparent 74.5%, rgba(15, 23, 42, 0.03) 75%, transparent 75.5%),
          linear-gradient(90deg, transparent 24.5%, rgba(15, 23, 42, 0.03) 25%, transparent 25.5%, transparent 49.5%, rgba(15, 23, 42, 0.03) 50%, transparent 50.5%, transparent 74.5%, rgba(15, 23, 42, 0.03) 75%, transparent 75.5%);
      }
      .map-canvas {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 100%;
        aspect-ratio: 2 / 1;
        transform: translate(-50%, -50%);
        transform-origin: center center;
        transition: transform 0.18s ease-out;
        z-index: 0;
        will-change: transform;
      }
      .world-image,
      .map-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      .world-image {
        background: url("/assets/world-map.svg") center center / 100% 100% no-repeat;
        opacity: 0.72;
        z-index: 0;
        filter: saturate(0.4) hue-rotate(180deg) brightness(1.02);
      }
      .map-overlay { z-index: 1; }
      .world-land {
        fill: rgba(0, 82, 255, 0.11);
        stroke: rgba(0, 82, 255, 0.14);
        stroke-width: 1;
      }
      .world-outline {
        fill: none;
        stroke: rgba(15, 23, 42, 0.06);
        stroke-width: 1;
      }
      .map-overlay line {
        stroke: rgba(0, 82, 255, 0.18);
        stroke-width: 0.5;
        stroke-dasharray: 1.5 1.5;
        vector-effect: non-scaling-stroke;
      }
      #map-points {
        position: absolute;
        inset: 0;
        z-index: 2;
      }
      .map-dot {
        position: absolute;
        transform: translate(-50%, -50%);
        border-radius: 999px;
      }
      .map-dot--server {
        width: 10px;
        height: 10px;
        background: #0052ff;
        box-shadow: 0 0 0 5px rgba(0, 82, 255, 0.14);
      }
      .map-dot--server::after {
        content: "";
        position: absolute;
        inset: -4px;
        border-radius: inherit;
        border: 1px solid rgba(0, 82, 255, 0.2);
        animation: pulse 2.8s infinite;
      }
      .map-dot--client {
        width: 10px;
        height: 10px;
        background: #94a3b8;
        box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.06);
      }
      .map-dot--client.active {
        background: #16a34a;
        box-shadow: 0 0 0 5px rgba(34, 197, 94, 0.14);
      }
      .map-legend {
        position: absolute;
        right: 16px;
        bottom: 16px;
        z-index: 4;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 12px;
        color: var(--muted-foreground);
        padding: 8px 10px;
        border: 1px solid rgba(226, 232, 240, 0.95);
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(8px);
      }
      .map-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .map-legend i {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        display: inline-block;
      }
      .map-legend .server { background: #0052ff; }
      .map-legend .active { background: #16a34a; }
      .map-legend .inactive { background: #94a3b8; }
      .map-empty {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--muted-foreground);
        font-size: 13px;
        z-index: 3;
      }
      .page-footer {
        margin-top: auto;
        display: flex;
        justify-content: center;
        font: 11px/1 "JetBrains Mono", monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted-foreground);
        padding-top: 24px;
      }
      .page-footer strong {
        margin-left: 8px;
        color: var(--foreground);
      }

      /* ── Section labels ── */
      .section { margin-top: 0; }
      .section + .section { margin-top: 36px; }
      .section-label {
        font: 11px/1 "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--muted-foreground);
        margin-bottom: 12px;
      }
      .section-label span {
        color: var(--foreground);
        font-weight: 600;
      }

      /* ── Table card ── */
      .table-card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: var(--shadow);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      th, td {
        padding: 12px 16px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      th {
        font: 11px/1 "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted-foreground);
        background: var(--muted);
      }
      tbody tr {
        cursor: pointer;
        transition: background 0.15s;
      }
      tbody tr:last-child td { border-bottom: none; }
      tbody tr:hover { background: rgba(0, 82, 255, 0.025); }
      tbody td:first-child {
        position: relative;
      }
      tbody td:first-child::before {
        content: "";
        position: absolute;
        left: 0;
        top: 4px;
        bottom: 4px;
        width: 3px;
        border-radius: 0 3px 3px 0;
        background: var(--accent);
        opacity: 0;
        transition: opacity 0.15s;
      }
      tbody tr:hover td:first-child::before { opacity: 1; }
      td.meta {
        font-size: 13px;
        color: var(--muted-foreground);
      }
      .status-stack {
        display: grid;
        gap: 8px;
        min-width: 200px;
      }
      .status-line {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        font-size: 13px;
      }
      .status-line-label {
        font: 11px/1 "JetBrains Mono", monospace;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted-foreground);
      }
      .status-line-value {
        min-width: 0;
      }
      .status-line-value strong {
        display: block;
      }
      .status-line-value .usage-bar {
        margin-top: 6px;
      }
      .status-line-value .health-dots {
        justify-content: flex-start;
      }
      .row-arrow {
        color: var(--border);
        font-size: 18px;
        line-height: 1;
        transition: color 0.15s, transform 0.15s;
      }
      tbody tr:hover .row-arrow {
        color: var(--accent);
        transform: translateX(2px);
      }

      /* ── Badges / pills ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 500;
        background: var(--muted);
        color: var(--muted-foreground);
      }
      .badge--active {
        background: rgba(0, 82, 255, 0.08);
        color: var(--accent);
      }
      .badge--active::before {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--accent);
      }
      .support-pills {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .support-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        border: 1px solid var(--border);
        padding: 4px 8px;
        font-size: 11px;
        font-weight: 600;
        line-height: 1;
        background: rgba(15, 23, 42, 0.04);
        color: var(--muted-foreground);
      }
      .support-pill--on {
        border-color: rgba(22, 163, 74, 0.24);
        background: rgba(22, 163, 74, 0.1);
        color: #15803d;
      }

      /* ── Token value ── */
      .token-value {
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
      }

      /* ── Progress bar ── */
      .usage-bar {
        width: 120px;
        height: 4px;
        border-radius: 2px;
        background: var(--muted);
        margin-top: 6px;
        overflow: hidden;
      }
      .usage-bar--full {
        height: 8px;
        border-radius: 999px;
        background: rgba(148, 163, 184, 0.2);
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.14);
      }
      .usage-bar-fill {
        height: 100%;
        border-radius: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
        transition: width 0.4s ease;
      }
      .usage-bar-fill--warn {
        background: linear-gradient(90deg, #f59e0b, #fbbf24);
      }
      .usage-bar-fill--critical {
        background: linear-gradient(90deg, #ef4444, #f87171);
      }

      /* ── Health dots ── */
      .health-dots {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .health-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--border);
        transition: background 0.2s;
      }
      .health-dot--ok {
        background: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.15);
      }
      .health-dot--fail {
        background: #ef4444;
        box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.15);
      }

      /* ── Drawer ── */
      .drawer-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.15);
        backdrop-filter: blur(2px);
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s;
      }
      .drawer-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }
      .drawer {
        position: fixed;
        top: 0;
        right: 0;
        bottom: 0;
        width: min(520px, 92vw);
        background: var(--card);
        border-left: 1px solid var(--border);
        box-shadow: -20px 0 60px rgba(15, 23, 42, 0.1);
        z-index: 101;
        transform: translateX(100%);
        transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        display: flex;
        flex-direction: column;
      }
      .drawer.open { transform: translateX(0); }
      .drawer-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        padding: 24px 24px 16px;
        flex-shrink: 0;
        border-bottom: 1px solid var(--border);
      }
      .drawer-header h3 {
        margin: 0;
        font-size: 1.15rem;
        font-weight: 600;
      }
      .drawer-header-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 6px;
        font-size: 13px;
        color: var(--muted-foreground);
      }
      .drawer-close {
        appearance: none;
        border: none;
        background: var(--muted);
        border-radius: 10px;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        color: var(--muted-foreground);
        font-size: 16px;
        transition: background 0.15s, color 0.15s;
        flex-shrink: 0;
      }
      .drawer-close:hover { background: var(--border); color: var(--foreground); }
      .drawer-summary {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .drawer-summary-item small {
        display: block;
        font-size: 11px;
        font-family: "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: var(--muted-foreground);
      }
      .drawer-summary-item strong {
        display: block;
        margin-top: 4px;
        font-size: 1rem;
      }
      .drawer-body {
        flex: 1;
        overflow-y: auto;
        padding: 20px 24px 32px;
      }
      .drawer-section-label {
        font: 11px/1 "JetBrains Mono", monospace;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted-foreground);
        margin: 0 0 12px;
      }

      /* ── Log cards (shared for drawer items) ── */
      .item-card {
        background: var(--muted);
        border-radius: 14px;
        padding: 14px 16px;
        margin-bottom: 8px;
      }
      .item-card:last-child { margin-bottom: 0; }
      .item-card-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .item-card-top strong { font-size: 0.92rem; }
      .item-card-meta {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 6px;
        font-size: 12px;
        color: var(--muted-foreground);
      }
      .item-card-description {
        margin-top: 8px;
        font-size: 13px;
        line-height: 1.45;
        color: var(--foreground);
        white-space: pre-wrap;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .item-card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 6px;
        margin-top: 10px;
      }
      .item-card-grid-cell {
        font-size: 11px;
        color: var(--muted-foreground);
      }
      .item-card-grid-cell span {
        display: block;
        font-weight: 600;
        color: var(--foreground);
        font-size: 13px;
        margin-top: 1px;
      }
      .status-pill {
        display: inline-flex;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        font-family: "JetBrains Mono", monospace;
      }
      .status-pill--ok { background: rgba(16,185,129,0.1); color: #059669; }
      .status-pill--err { background: rgba(239,68,68,0.1); color: #dc2626; }
      .for-sale-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 48px;
        padding: 4px 10px;
        border-radius: 999px;
        font: 11px/1 "JetBrains Mono", monospace;
      }
      .for-sale-pill--yes {
        background: rgba(16,185,129,0.12);
        color: #059669;
      }
      .for-sale-pill--free {
        background: rgba(59,130,246,0.12);
        color: #2563eb;
      }
      .for-sale-pill--no {
        background: rgba(148,163,184,0.14);
        color: var(--muted-foreground);
      }
      .pill-sm {
        display: inline-flex;
        align-items: center;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        background: rgba(0,82,255,0.07);
        color: var(--accent);
      }

      /* ── Empty state ── */
      .empty {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        color: var(--muted-foreground);
        font-size: 14px;
        text-align: center;
      }
      .empty-icon {
        width: 40px;
        height: 40px;
        border-radius: 999px;
        border: 2px dashed var(--border);
        margin-bottom: 12px;
      }

      /* ── Responsive ── */
      @media (max-width: 980px) {
        .topbar { flex-direction: column; align-items: flex-start; }
        .drawer-summary { grid-template-columns: 1fr 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <!-- Topbar -->
      <div class="topbar">
        <a
          class="topbar-brand"
          href="https://tokenswitch.org"
          target="_blank"
          rel="noopener noreferrer"
        ><span class="dot"></span>TokenSwitch</a>
        <div class="topbar-right">
          <div class="topbar-region">
            <label for="region-select">Router</label>
            <select id="region-select" aria-label="Router"></select>
          </div>
          <span class="topbar-sep">&middot;</span>
          <span class="topbar-stat" title="Total number of clients registered on this router.">
            <strong id="stat-clients">0</strong> clients
          </span>
          <span class="topbar-sep">&middot;</span>
          <span class="topbar-stat" title="Clients whose share status is currently active.">
            <strong id="stat-active-shares">0</strong> active shares
          </span>
          <span class="topbar-sep">&middot;</span>
          <span class="topbar-stat" title="Live tunnel leases currently active on this router.">
            <strong id="stat-leases">0</strong> active leases
          </span>
          <span class="topbar-sync">synced <span id="last-sync">--</span></span>
        </div>
      </div>

      <section class="section">
        <div class="map-shell" id="map-shell">
          <div class="map-canvas" id="map-canvas">
            <div class="world-image" aria-hidden="true"></div>
            <svg class="map-overlay" id="map-overlay" viewBox="0 0 360 180"></svg>
            <div id="map-points"></div>
          </div>
          <div class="map-controls">
            <button class="map-control-btn" id="map-zoom-out" type="button" aria-label="Zoom out">-</button>
            <span class="map-zoom-label" id="map-zoom-label">100%</span>
            <button class="map-control-btn" id="map-zoom-in" type="button" aria-label="Zoom in">+</button>
            <button class="map-control-btn" id="map-zoom-reset" type="button" aria-label="Reset map view">↺</button>
          </div>
          <div class="map-legend">
            <span><i class="server"></i>router</span>
            <span><i class="active"></i>active client</span>
            <span><i class="inactive"></i>idle client</span>
          </div>
          <div class="map-empty" id="map-empty">Waiting for server geo or client locations</div>
        </div>
      </section>

      <!-- Clients -->
      <section class="section">
        <div class="section-label">CLIENTS <span id="client-count">0</span></div>
        <div class="table-card">
          <table>
            <thead>
              <tr>
                <th>Share</th>
                <th>API URL&KEY</th>
                <th>ForSale</th>
                <th>Region</th>
                <th>Status</th>
                <th>Support</th>
                <th style="width:28px"></th>
              </tr>
            </thead>
            <tbody id="clients"></tbody>
          </table>
        </div>
      </section>
      <footer class="page-footer">
        <span>Page Online</span>
        <strong id="page-online-count">0</strong>
      </footer>
    </main>

    <!-- Universal drawer -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer">
      <div class="drawer-header">
        <div>
          <h3 id="drawer-title"></h3>
          <div class="drawer-header-meta" id="drawer-meta"></div>
        </div>
        <button class="drawer-close" id="drawer-close" aria-label="Close">&times;</button>
      </div>
      <div class="drawer-summary" id="drawer-summary"></div>
      <div class="drawer-body" id="drawer-body"></div>
    </aside>

    <script>
      let _clients = [];
      let _drawerOpen = false;
      let _mapZoom = 1;
      let _mapPanX = 0;
      let _mapPanY = 0;
      let _mapDragState = null;
      let _regions = [];
      const _pagePresenceSession = (window.crypto && crypto.randomUUID)
        ? crypto.randomUUID()
        : `session-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;

      /* ── Helpers ── */
      function relTime(value) {
        if (!value) return "--";
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return "--";
        const diff = (Date.now() - d.getTime()) / 1000;
        const absDiff = Math.abs(diff);

        if (absDiff < 5) return "just now";

        if (diff < 0) {
          if (absDiff < 60) return `in ${Math.floor(absDiff)}s`;
          if (absDiff < 3600) return `in ${Math.floor(absDiff / 60)}m`;
          if (absDiff < 86400) return `in ${Math.floor(absDiff / 3600)}h`;
          if (absDiff < 31536000) return `in ${Math.floor(absDiff / 86400)}d`;
          return `in ${Math.floor(absDiff / 31536000)}y`;
        }

        if (diff < 60) return `${Math.floor(diff)}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        if (diff < 31536000) return `${Math.floor(diff / 86400)}d ago`;
        return `${Math.floor(diff / 31536000)}y ago`;
      }

      function fullTime(value) {
        if (!value) return "";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "";
        const parts = new Intl.DateTimeFormat(undefined, {
          timeZone: "UTC",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        }).formatToParts(date);
        const pick = (type) => parts.find((part) => part.type === type)?.value ?? "00";
        return `${pick("year")}-${pick("month")}-${pick("day")} ${pick("hour")}:${pick("minute")}:${pick("second")} UTC`;
      }

      function relTimeFromDate(value) {
        const ts = value instanceof Date ? value.getTime() : value;
        const diff = Math.max(0, Math.floor((Date.now() - ts) / 1000));
        if (diff < 60) return `${diff}s ago`;
        if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
        if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
        return `${Math.floor(diff / 86400)}d ago`;
      }

      function totalTokens(log) {
        return (log.inputTokens || 0) + (log.outputTokens || 0) +
               (log.cacheReadTokens || 0) + (log.cacheCreationTokens || 0);
      }

      function usagePercent(used, limit) {
        if (isUnlimitedTokenLimit(limit) || !limit || limit <= 0) return 0;
        return Math.min(100, Math.round((used / limit) * 100));
      }

      function usageBarClass(pct) {
        if (pct >= 95) return "usage-bar-fill usage-bar-fill--critical";
        if (pct >= 80) return "usage-bar-fill usage-bar-fill--warn";
        return "usage-bar-fill";
      }

      function isUnlimitedTokenLimit(limit) {
        return limit === -1;
      }

      function formatNum(n) {
        if (n == null) return "0";
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, "") + "M";
        if (n >= 10_000) return (n / 1_000).toFixed(1).replace(/\.0$/, "") + "k";
        return String(n);
      }

      function formatUsage(used, limit) {
        return isUnlimitedTokenLimit(limit)
          ? `${formatNum(used)}/∞`
          : `${formatNum(used)} / ${formatNum(limit)}`;
      }

      function normalizeRegionUrl(url) {
        if (!url) return "";
        return /^[a-z][a-z0-9+.-]*:\/\//i.test(url) ? url : `https://${url}`;
      }

      function currentRegion() {
        const hostname = window.location.hostname || "";
        const matched = _regions.find((region) => {
          try {
            return new URL(normalizeRegionUrl(region.url)).hostname === hostname;
          } catch {
            return false;
          }
        });
        return matched?.name || "";
      }

      function regionUrl(region) {
        const matched = _regions.find((item) => item.name === region);
        return matched ? normalizeRegionUrl(matched.url) : "";
      }

      async function bootRegions() {
        const select = document.getElementById("region-select");
        if (!select) return;

        const res = await fetch("/v1/regions");
        _regions = res.ok ? await res.json() : [];
        select.innerHTML = _regions.map((region) => {
          const selected = region.name === currentRegion() ? " selected" : "";
          return `<option value="${escapeHtml(region.name)}"${selected}>${escapeHtml(region.name)}</option>`;
        }).join("");
        select.disabled = _regions.length === 0;
        if (!select.value && _regions.length > 0) {
          select.value = _regions[0].name;
        }
      }

      function formatPct(value) {
        if (value == null || Number.isNaN(value)) return "0.0%";
        return `${value.toFixed(1)}%`;
      }

      function formatShareStatus(value) {
        if (!value) return "No share";
        return String(value).replaceAll("_", " ");
      }

      function supportPills(support) {
        const apps = [
          { key: "claude", label: "Claude" },
          { key: "codex", label: "Codex" },
          { key: "gemini", label: "Gemini" },
        ];
        return `<div class="support-pills">${apps.map((app) => `
          <span class="support-pill ${support?.[app.key] ? "support-pill--on" : ""}">${app.label}</span>
        `).join("")}</div>`;
      }

      function titleApp(value) {
        if (!value) return "Unknown";
        return String(value).slice(0, 1).toUpperCase() + String(value).slice(1);
      }

      function upstreamKindLabel(upstream) {
        if (!upstream || upstream.kind === "unknown") return "Upstream unknown";
        if (upstream.kind === "official_oauth") return "Official Subscription";
        if (upstream.kind === "custom_provider") return "Custom Provider";
        return String(upstream.kind).replaceAll("_", " ");
      }

      function quotaSummary(upstream) {
        if (!upstream) return "No official subscription quota";
        if (upstream.kind !== "official_oauth") return "No official subscription quota";
        const quota = upstream.quota;
        if (!quota) return "Official quota unavailable";
        if (quota.status && quota.status !== "ok") return "Official quota unavailable";
        const tiers = (quota.tiers || []).filter((tier) => tier && tier.label);
        if (!tiers.length) return "Official quota unavailable";
        return tiers.map((tier) => `${tier.label} ${Math.round(tier.utilization || 0)}%`).join(" · ");
      }

      function upstreamSummary(share) {
        const upstream = share?.upstreamProvider;
        if (!upstream) return "Upstream unknown";
        const parts = [upstreamKindLabel(upstream)];
        if (upstream.kind === "official_oauth") {
          parts.push(titleApp(upstream.app));
        }
        if (upstream.providerName && upstream.kind !== "official_oauth") {
          parts.push(upstream.providerName);
        }
        if (upstream.providerName && upstream.kind === "official_oauth") {
          parts.push(upstream.providerName);
        }
        if (upstream.accountEmail) {
          parts.push(upstream.accountEmail);
        }
        return parts.filter(Boolean).join(" · ");
      }

      function upstreamDetails(share) {
        const upstream = share?.upstreamProvider;
        const provider = upstream?.providerName || "—";
        const account = upstream?.accountEmail || "—";
        const quota = quotaSummary(upstream);
        return `
          <div class="drawer-section-label">Upstream</div>
          <div class="item-card">
            <div class="item-card-top">
              <strong>${escapeHtml(upstreamKindLabel(upstream))}</strong>
              ${upstream?.app ? `<span class="badge">${escapeHtml(titleApp(upstream.app))}</span>` : ""}
            </div>
            <div class="item-card-grid">
              <div class="item-card-grid-cell">Provider<span>${escapeHtml(provider)}</span></div>
              <div class="item-card-grid-cell">Account<span>${escapeHtml(account)}</span></div>
              <div class="item-card-grid-cell">Official Limit<span>${escapeHtml(quota)}</span></div>
            </div>
          </div>
        `;
      }

      const COUNTRY_CENTROIDS = {
        AR: [-38.42, -63.62], AT: [47.52, 14.55], AU: [-25.27, 133.77], BE: [50.50, 4.47],
        BR: [-14.23, -51.92], CA: [56.13, -106.35], CH: [46.82, 8.23], CL: [-35.68, -71.54],
        CN: [35.86, 104.20], CO: [4.57, -74.30], DE: [51.17, 10.45], DK: [56.26, 9.50],
        EG: [26.82, 30.80], ES: [40.46, -3.75], FI: [61.92, 25.75], FR: [46.22, 2.21],
        GB: [55.38, -3.43], GR: [39.07, 21.82], HK: [22.32, 114.17], ID: [-0.79, 113.92],
        IE: [53.41, -8.24], IL: [31.05, 34.85], IN: [20.59, 78.96], IT: [41.87, 12.57],
        JP: [36.20, 138.25], KR: [35.91, 127.77], MX: [23.63, -102.55], MY: [4.21, 101.98],
        NG: [9.08, 8.67], NL: [52.13, 5.29], NO: [60.47, 8.47], NZ: [-40.90, 174.89],
        PE: [-9.19, -75.02], PH: [12.88, 121.77], PL: [51.92, 19.15], PT: [39.40, -8.22],
        RU: [61.52, 105.31], SA: [23.89, 45.08], SE: [60.13, 18.64], SG: [1.35, 103.82],
        TH: [15.87, 100.99], TR: [38.96, 35.24], TW: [23.70, 120.96], UA: [48.38, 31.17],
        US: [39.83, -98.58], VN: [14.06, 108.28], ZA: [-30.56, 22.94]
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function projectPoint(lat, lon, width, height) {
        return {
          x: ((lon + 180) / 360) * width,
          y: ((90 - lat) / 180) * height,
          xPct: ((lon + 180) / 360) * 100,
          yPct: ((90 - lat) / 180) * 100,
        };
      }

      function renderMap(map) {
        const pointsEl = document.getElementById("map-points");
        const overlayEl = document.getElementById("map-overlay");
        const emptyEl = document.getElementById("map-empty");
        const width = 360;
        const height = 180;
        const clients = (map?.clients || []).map((item) => {
          const lat = item.lat ?? COUNTRY_CENTROIDS[item.countryCode]?.[0];
          const lon = item.lon ?? COUNTRY_CENTROIDS[item.countryCode]?.[1];
          return lat == null || lon == null ? null : { ...item, lat, lon };
        }).filter(Boolean);
        const server = map?.server?.lat != null && map?.server?.lon != null ? map.server : null;

        if (!server && clients.length === 0) {
          pointsEl.innerHTML = "";
          overlayEl.innerHTML = "";
          emptyEl.style.display = "flex";
          return;
        }

        emptyEl.style.display = "none";
        const points = [];
        const lines = [];
        const serverPoint = server ? projectPoint(server.lat, server.lon, width, height) : null;
        if (server && serverPoint) {
          points.push(
            `<div class="map-dot map-dot--server" style="left:${serverPoint.xPct}%;top:${serverPoint.yPct}%" title="${escapeHtml(server.label)}"></div>`
          );
        }

        // Detect clients overlapping with server and offset them into a ring
        const OVERLAP_DIST = 2; // percentage threshold
        const OFFSET_RADIUS = 3; // percentage offset radius
        const overlapping = [];
        const nonOverlapping = [];
        for (const client of clients) {
          const point = projectPoint(client.lat, client.lon, width, height);
          if (serverPoint && Math.hypot(point.xPct - serverPoint.xPct, point.yPct - serverPoint.yPct) < OVERLAP_DIST) {
            overlapping.push({ client, point });
          } else {
            nonOverlapping.push({ client, point });
          }
        }
        // Spread overlapping clients in a ring around the server
        for (let i = 0; i < overlapping.length; i++) {
          const angle = (2 * Math.PI * i) / overlapping.length - Math.PI / 2;
          overlapping[i].point.xPct = serverPoint.xPct + Math.cos(angle) * OFFSET_RADIUS;
          overlapping[i].point.yPct = serverPoint.yPct + Math.sin(angle) * OFFSET_RADIUS;
          overlapping[i].point.x = (overlapping[i].point.xPct / 100) * width;
          overlapping[i].point.y = (overlapping[i].point.yPct / 100) * height;
        }
        const allClients = [...nonOverlapping, ...overlapping];

        for (const { client, point } of allClients) {
          if (serverPoint) {
            lines.push(`<line x1="${serverPoint.x}" y1="${serverPoint.y}" x2="${point.x}" y2="${point.y}"></line>`);
          }
          const title = [
            client.label,
            client.platform || "",
            client.countryCode || "",
            client.lastSeenAt ? fullTime(client.lastSeenAt) : "",
          ].filter(Boolean).join(" · ");
          points.push(
            `<div class="map-dot map-dot--client ${client.isActive ? "active" : ""}" style="left:${point.xPct}%;top:${point.yPct}%" title="${escapeHtml(title)}"></div>`
          );
        }

        overlayEl.innerHTML = lines.join("");
        pointsEl.innerHTML = points.join("");
        applyMapZoom();
      }

      function clampMapZoom(value) {
        return Math.max(1, Math.min(3, value));
      }

      function clampMapPan() {
        const shell = document.getElementById("map-shell");
        const canvas = document.getElementById("map-canvas");
        if (!shell || !canvas) return;
        const sw = shell.clientWidth;
        const sh = shell.clientHeight;
        const cw = canvas.offsetWidth * _mapZoom;
        const ch = canvas.offsetHeight * _mapZoom;
        const maxX = Math.max(0, (cw - sw) / 2);
        const maxY = Math.max(0, (ch - sh) / 2);
        _mapPanX = Math.max(-maxX, Math.min(maxX, _mapPanX));
        _mapPanY = Math.max(-maxY, Math.min(maxY, _mapPanY));
      }

      function applyMapZoom() {
        const canvas = document.getElementById("map-canvas");
        const label = document.getElementById("map-zoom-label");
        const shell = document.getElementById("map-shell");
        if (!canvas || !label) return;
        clampMapPan();
        canvas.style.transform =
          `translate(-50%, -50%) translate(${_mapPanX}px, ${_mapPanY}px) scale(${_mapZoom})`;
        label.textContent = `${Math.round(_mapZoom * 100)}%`;
        shell?.classList.toggle("zoomed", _mapZoom > 1.001);
      }

      function setMapZoom(nextZoom) {
        _mapZoom = clampMapZoom(nextZoom);
        applyMapZoom();
      }

      function resetMapView() {
        _mapZoom = 1;
        _mapPanX = 0;
        _mapPanY = 0;
        applyMapZoom();
      }

      function bindMapZoomControls() {
        const shell = document.getElementById("map-shell");
        const zoomIn = document.getElementById("map-zoom-in");
        const zoomOut = document.getElementById("map-zoom-out");
        const zoomReset = document.getElementById("map-zoom-reset");
        zoomIn?.addEventListener("click", () => setMapZoom(_mapZoom + 0.2));
        zoomOut?.addEventListener("click", () => setMapZoom(_mapZoom - 0.2));
        zoomReset?.addEventListener("click", resetMapView);
        shell?.addEventListener("wheel", (event) => {
          event.preventDefault();
          const delta = event.deltaY < 0 ? 0.15 : -0.15;
          setMapZoom(_mapZoom + delta);
        }, { passive: false });
        shell?.addEventListener("mousedown", (event) => {
          if (event.button !== 0) return;
          _mapDragState = {
            startX: event.clientX,
            startY: event.clientY,
            panX: _mapPanX,
            panY: _mapPanY,
          };
          shell.classList.add("dragging");
          event.preventDefault();
        });
        window.addEventListener("mousemove", (event) => {
          if (!_mapDragState) return;
          _mapPanX = _mapDragState.panX + (event.clientX - _mapDragState.startX);
          _mapPanY = _mapDragState.panY + (event.clientY - _mapDragState.startY);
          applyMapZoom();
        });
        window.addEventListener("mouseup", () => {
          _mapDragState = null;
          shell?.classList.remove("dragging");
        });
        shell?.addEventListener("mouseleave", () => {
          if (!_mapDragState) shell.classList.remove("dragging");
        });
        window.addEventListener("resize", () => applyMapZoom());
        applyMapZoom();
      }

      function bindRegionSelect() {
        const select = document.getElementById("region-select");
        if (!select) return;
        select.addEventListener("change", () => {
          if (!select.value) return;
          const url = regionUrl(select.value);
          if (url) window.location.href = url;
        });
      }

      function healthDots(checks) {
        const total = 10;
        if (!checks || checks.length === 0) {
          // No route probe data yet — show all gray (unknown state).
          return `<span class="health-dots">${'<span class="health-dot"></span>'.repeat(total)}</span>`;
        }
        const now = Math.floor(Date.now() / 1000);
        const dots = [];
        const minuteStatus = new Map();
        for (const c of checks) {
          const bucket = Math.floor(c.checkedAt / 60);
          const prev = minuteStatus.get(bucket);
          minuteStatus.set(bucket, Boolean(prev) || Boolean(c.isHealthy));
        }
        for (let i = total - 1; i >= 0; i--) {
          const bucket = Math.floor((now - i * 60) / 60);
          const isCurrentBucket = i === 0;
          const healthy = minuteStatus.get(bucket);
          const hit = healthy === true || isCurrentBucket;
          const cls = hit ? "health-dot--ok" : "health-dot--fail";
          const bucketDate = new Date(bucket * 60 * 1000);
          const rel = relTimeFromDate(bucketDate);
          const statusText = healthy === true || isCurrentBucket ? "ok" : "route probe failed";
          dots.push(`<span class="health-dot ${cls}" title="${rel} — ${statusText}"></span>`);
        }
        return `<span class="health-dots">${dots.join("")}</span>`;
      }

      function shareStatusBadge(share) {
        if (!share) return '<span class="badge">No share</span>';
        const healthy = (share.healthChecks || []).some((item) => item.isHealthy);
        if (share.shareStatus === "active") {
          return `<span class="badge badge--active">${escapeHtml(formatShareStatus(share.shareStatus))}</span>`;
        }
        if (healthy) {
          return `<span class="badge">${escapeHtml(formatShareStatus(share.shareStatus))}</span>`;
        }
        return `<span class="badge">${escapeHtml(formatShareStatus(share.shareStatus))}</span>`;
      }

      function shareApiUrlKey(share) {
        if (!share) return "—";
        const baseHost = window.location.host || "";
        const apiHost = share.subdomain && baseHost ? `${share.subdomain}.${baseHost}` : (share.subdomain || baseHost || "—");
        return `${apiHost}[${share.shareToken || "***"}]`;
      }

      function isUnlimitedExpiry(value) {
        if (!value) return false;
        const expiresAt = new Date(value).getTime();
        if (Number.isNaN(expiresAt)) return false;
        const fiftyYearsMs = 50 * 365 * 24 * 60 * 60 * 1000;
        return expiresAt - Date.now() >= fiftyYearsMs;
      }

      function expiryLabel(value) {
        return isUnlimitedExpiry(value) ? "Unlimited" : relTime(value);
      }

      function expiryTitle(value) {
        return isUnlimitedExpiry(value) ? "Unlimited" : fullTime(value);
      }

      function expirySortValue(share) {
        if (!share || !share.expiresAt) return 0;
        if (isUnlimitedExpiry(share.expiresAt)) return Number.POSITIVE_INFINITY;
        const expiresAt = new Date(share.expiresAt).getTime();
        return Number.isNaN(expiresAt) ? 0 : expiresAt;
      }

      function compareNumberDesc(left, right) {
        if (left === right) return 0;
        return left > right ? -1 : 1;
      }

      function sortClients(clients) {
        return [...clients].sort((left, right) => {
          const leftShare = left.share;
          const rightShare = right.share;

          const onlineCmp = compareNumberDesc(leftShare?.onlineMinutes24h || 0, rightShare?.onlineMinutes24h || 0);
          if (onlineCmp) return onlineCmp;

          const limitCmp = compareNumberDesc(
            isUnlimitedTokenLimit(leftShare?.tokenLimit) ? Number.POSITIVE_INFINITY : (leftShare?.tokenLimit || 0),
            isUnlimitedTokenLimit(rightShare?.tokenLimit) ? Number.POSITIVE_INFINITY : (rightShare?.tokenLimit || 0),
          );
          if (limitCmp) return limitCmp;

          const expiryCmp = compareNumberDesc(expirySortValue(leftShare), expirySortValue(rightShare));
          if (expiryCmp) return expiryCmp;

          return shareApiUrlKey(leftShare).localeCompare(shareApiUrlKey(rightShare), undefined, { sensitivity: "base" });
        });
      }

      function forSalePill(share) {
        if (!share) return '<span class="meta">—</span>';
        const value = share.forSale === "Free" ? "Free" : (share.forSale === "Yes" ? "Yes" : "No");
        const cls = value === "Yes"
          ? "for-sale-pill--yes"
          : (value === "Free" ? "for-sale-pill--free" : "for-sale-pill--no");
        return `<span class="for-sale-pill ${cls}">${value}</span>`;
      }

      function shareStatusStack(share, pct) {
        if (!share) return '<span class="meta">—</span>';
        const usage = `
          <strong>${formatUsage(share.tokensUsed, share.tokenLimit)}</strong>
          ${isUnlimitedTokenLimit(share.tokenLimit) ? "" : `<div class="usage-bar"><div class="${usageBarClass(pct)}" style="width:${pct}%"></div></div>`}
        `;
        const expires = `<strong title="${escapeHtml(expiryTitle(share.expiresAt))}">${escapeHtml(expiryLabel(share.expiresAt))}</strong>`;
        const online = `<strong title="${share.onlineMinutes24h || 0} / 1440 min online in last 24h">${formatPct(share.onlineRate24h || 0)}</strong>`;
        const health = healthDots(share.healthChecks || []);
        return `
          <div class="status-stack">
            <div class="status-line">
              <span class="status-line-label">Usage</span>
              <div class="status-line-value">${usage}</div>
            </div>
            <div class="status-line">
              <span class="status-line-label">Expires</span>
              <div class="status-line-value">${expires}</div>
            </div>
            <div class="status-line">
              <span class="status-line-label">Online</span>
              <div class="status-line-value">${online}</div>
            </div>
            <div class="status-line">
              <span class="status-line-label">Health</span>
              <div class="status-line-value">${health}</div>
            </div>
          </div>
        `;
      }

      async function updatePagePresence() {
        const res = await fetch("/v1/dashboard/presence", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ sessionId: _pagePresenceSession }),
          keepalive: true,
        });
        if (!res.ok) throw new Error("Failed to update presence: " + res.status);
        const data = await res.json();
        document.getElementById("page-online-count").textContent = String(data.onlineCount ?? 0);
      }

      /* ── Drawer ── */
      const overlay = document.getElementById("drawer-overlay");
      const drawer = document.getElementById("drawer");

      function openDrawer() {
        _drawerOpen = true;
        drawer.classList.add("open");
        overlay.classList.add("open");
      }

      function closeDrawer() {
        _drawerOpen = false;
        drawer.classList.remove("open");
        overlay.classList.remove("open");
      }

      overlay.addEventListener("click", closeDrawer);
      document.getElementById("drawer-close").addEventListener("click", closeDrawer);
      document.addEventListener("keydown", (e) => { if (e.key === "Escape") closeDrawer(); });

      /* ── Open client drawer ── */
      function openClient(index) {
        const client = _clients[index];
        if (!client) return;
        const item = client.installation;
        const share = client.share;

        document.getElementById("drawer-title").textContent = item.platform;
        document.getElementById("drawer-meta").innerHTML =
          `<span>${escapeHtml(item.region || "Unknown region")}</span><span style="font-family:'JetBrains Mono',monospace;font-size:12px">${item.id.slice(0, 12)}</span>`;

        document.getElementById("drawer-summary").innerHTML = `
          <div class="drawer-summary-item">
            <small>Platform</small>
            <strong>${escapeHtml(item.platform)}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Version</small>
            <strong>v${escapeHtml(item.appVersion)}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Last Seen</small>
            <strong title="${fullTime(item.lastSeenAt)}">${relTime(item.lastSeenAt)}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Status</small>
            <strong>${escapeHtml(formatShareStatus(share?.shareStatus || ""))}</strong>
          </div>
          <div class="drawer-summary-item">
            <small>Active Leases</small>
            <strong>${item.activeLeaseCount}</strong>
          </div>`;

        const leases = (item.leases || []).slice(0, 3);
        const pct = share ? usagePercent(share.tokensUsed, share.tokenLimit) : 0;
        const description = share?.description ? `
            <div class="item-card-description">${escapeHtml(share.description)}</div>
          ` : "";
        const shareSection = share ? `
          <div class="drawer-section-label">Share</div>
          <div class="item-card">
            <div class="item-card-top">
              <strong>${escapeHtml(share.shareName)}</strong>
              ${shareStatusBadge(share)}
            </div>
            ${description}
            <div class="item-card-grid">
              <div class="item-card-grid-cell">Usage<span>${formatUsage(share.tokensUsed, share.tokenLimit)}</span></div>
              <div class="item-card-grid-cell">Requests<span>${formatNum(share.requestsCount)}</span></div>
            </div>
            ${isUnlimitedTokenLimit(share.tokenLimit) ? "" : `<div class="usage-bar usage-bar--full" style="margin-top:10px;width:100%"><div class="${usageBarClass(pct)}" style="width:${pct}%"></div></div>`}
          </div>
          ${upstreamDetails(share)}
        ` : `
          <div class="drawer-section-label">Share</div>
          <div class="empty"><div class="empty-icon"></div>No share linked to this client</div>
        `;
        const logs = share?.recentRequests || [];
        document.getElementById("drawer-body").innerHTML = `
          ${shareSection}
          <div class="drawer-section-label">Request logs</div>
          ${logs.length ? logs.map(log => `
            <div class="item-card">
              <div class="item-card-top">
                <div>
                  <strong>${log.model || log.requestModel || "-"}</strong>
                  <div class="item-card-meta">
                    <span>${log.providerName || log.providerId}</span>
                    <span title="${fullTime((log.createdAt || 0) * 1000)}">${relTime((log.createdAt || 0) * 1000)}</span>
                    ${log.isStreaming ? '<span>stream</span>' : ""}
                  </div>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  <span class="status-pill ${log.statusCode >= 200 && log.statusCode < 400 ? 'status-pill--ok' : 'status-pill--err'}">${log.statusCode}</span>
                  <span style="font-size:12px;color:var(--muted-foreground)">${log.latencyMs}ms</span>
                </div>
              </div>
              <div class="item-card-grid">
                <div class="item-card-grid-cell">Input<span>${log.inputTokens || 0}</span></div>
                <div class="item-card-grid-cell">Output<span>${log.outputTokens || 0}</span></div>
                <div class="item-card-grid-cell">Cache R<span>${log.cacheReadTokens || 0}</span></div>
                <div class="item-card-grid-cell">Cache W<span>${log.cacheCreationTokens || 0}</span></div>
                <div class="item-card-grid-cell">Total<span>${totalTokens(log)}</span></div>
              </div>
            </div>
          `).join("") : '<div class="empty"><div class="empty-icon"></div>No request logs yet</div>'}
          <div class="drawer-section-label">Recent leases</div>
          ${leases.length ? leases.map(lease => `
            <div class="item-card">
              <div class="item-card-top">
                <strong>${lease.subdomain}</strong>
                <span class="pill-sm">${lease.isActive ? "active" : "expired"}</span>
              </div>
              <div class="item-card-meta">
                <span>${lease.tunnelType}</span>
                <span title="${fullTime(lease.issuedAt)}">issued ${relTime(lease.issuedAt)}</span>
                <span title="${fullTime(lease.expiresAt)}">expires ${relTime(lease.expiresAt)}</span>
                ${lease.share ? `<span>share: ${lease.share.shareName}</span>` : ""}
              </div>
            </div>
          `).join("") : '<div class="empty"><div class="empty-icon"></div>No leases yet</div>'}`;

        openDrawer();
      }

      /* ── Data fetch ── */
      async function boot() {
        const res = await fetch("/v1/dashboard");
        if (!res.ok) throw new Error("Failed to fetch: " + res.status);
        const data = await res.json();

        _clients = sortClients(data.clients || []);

        /* topbar stats */
        document.getElementById("stat-clients").textContent = data.stats.clients;
        document.getElementById("stat-active-shares").textContent = data.stats.activeShares;
        document.getElementById("stat-leases").textContent = data.stats.activeLeases;
        document.getElementById("last-sync").textContent = relTime(data.generatedAt);
        document.getElementById("last-sync").title = fullTime(data.generatedAt);
        renderMap(data.map || null);

        /* section counts */
        document.getElementById("client-count").textContent = _clients.length;

        /* skip DOM rewrite while drawer is open to prevent flicker */
        if (_drawerOpen) return;

        /* clients table */
        const clientsEl = document.getElementById("clients");
        clientsEl.innerHTML = _clients.length ? _clients.map((client, i) => {
          const item = client.installation;
          const share = client.share;
          const pct = share ? usagePercent(share.tokensUsed, share.tokenLimit) : 0;
          return `
          <tr onclick="openClient(${i})">
            <td>${share ? `<strong>${escapeHtml(share.shareName)}</strong>` : '<span class="meta">—</span>'}</td>
            <td class="meta">${share ? `<strong>${escapeHtml(shareApiUrlKey(share))}</strong>` : '<span class="meta">—</span>'}</td>
            <td>${forSalePill(share)}</td>
            <td class="meta">${escapeHtml(item.countryCode || "-")}</td>
            <td>${shareStatusStack(share, pct)}</td>
            <td>${share ? supportPills(share.support) : '<span class="meta">—</span>'}</td>
            <td><span class="row-arrow">&rsaquo;</span></td>
          </tr>
        `;
        }).join("") : `<tr><td colspan="7"><div class="empty"><div class="empty-icon"></div>No clients yet</div></td></tr>`;
      }

      bootRegions().catch(console.error);
      bindRegionSelect();
      boot().catch(err => {
        document.body.innerHTML += `<pre style="padding:20px;color:#b91c1c">${String(err)}</pre>`;
      });
      bindMapZoomControls();
      applyMapZoom();
      updatePagePresence().catch(console.error);
      setInterval(() => boot().catch(console.error), 5000);
      setInterval(() => updatePagePresence().catch(console.error), 15000);
    </script>
  </body>
</html>
